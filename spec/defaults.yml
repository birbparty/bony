# Canonical default-table source.
#
# Later feature beads append concrete object defaults here when they append the
# matching registry entries. Do not duplicate defaults in runtime code by hand;
# codegen consumes this file.

format: bony-default-table
defaultsVersion: 1

sourceOfTruth:
  defaultsOwn:
    - default values
    - default-omission decisions
    - default-apply behavior on load
  registryOwns:
    - object identity
    - property identity
    - property wire key
    - backing type
    - object property membership
  schemaOwns:
    - generated artifact only
    - no independent source-of-truth role

entrySchemas:
  objectDefaults:
    required:
      - object
      - properties
      - ownerBead
    fields:
      object: id of a declared registry object entry
      ownerBead: bead that introduced or last intentionally changed the defaults
      properties: mapping from property id to default entry
  propertyDefault:
    required:
      - value
      - omitWhenDefault
      - applyOnLoad
    fields:
      value: canonical YAML representation of the default value
      omitWhenDefault: whether JSON and binary canonical writers omit this value
      applyOnLoad: whether loaders synthesize this value when the field is absent
      equality: optional id from equalityModes; otherwise infer from backing type
      doc: human-readable explanation
  requiredProperty:
    required:
      - property
      - reason
      - ownerBead
    fields:
      property: id of a declared registry property valid for the owning object
      reason: why absence is invalid or owned outside default application
      ownerBead: bead that introduced the required/no-default rule
      doc: human-readable explanation

validationRules:
  - every objectDefaults.object must exist in registry/wire.yml objects
  - every property key in objectDefaults.properties must exist in registry/wire.yml propertyKeys
  - every defaulted property must be valid for the owning object
  - every default value must match the property's registry backing type and JSON schema type
  - omitWhenDefault true requires applyOnLoad true
  - every object property must appear exactly once in either objectDefaults.properties or requiredProperties
  - requiredProperties entries must reference properties valid for the owning object
  - changing an existing default requires the owner bead to update conformance expectations

equalityModes:
  - id: exactInteger
    appliesTo: [varuint, varint]
  - id: storedF32
    appliesTo: [f32]
  - id: exactBool
    appliesTo: [bool]
  - id: exactString
    appliesTo: [string]
  - id: exactColor
    appliesTo: [color]
  - id: exactBytes
    appliesTo: [bytes]
  - id: arrayElements
    appliesTo: [composite]
  - id: objectProperties
    appliesTo: [composite]

canonicalEquality:
  integers: exact numeric equality after range validation
  floats: compare stored f32 value for f32-backed fields, otherwise exact semantic value
  bools: exact boolean equality
  strings: exact Unicode scalar sequence equality with no normalization
  colors: exact channel equality in canonical RGBA order
  bytes: exact byte equality
  arrays: length and element equality in stored order
  objects: property-by-property equality using this table

objectDefaults: []
requiredProperties: []
