        applyOnLoad: true
        doc: Empty packed membership means this skin owns no required transform constraints.
      skinPathConstraints:
        value: ""
        omitWhenDefault: true
        applyOnLoad: true
        doc: Empty packed membership means this skin owns no required path constraints.
      skinPhysicsConstraints:
        value: ""
        omitWhenDefault: true
        applyOnLoad: true
        doc: Empty packed membership means this skin owns no required physics constraints.
  - object: skinEntry
    ownerBead: bony-4set
    properties: {}

requiredProperties:
  - object: skeleton
    property: name
    reason: Skeleton metadata needs a stable name for diagnostics and tooling.
    ownerBead: bony-c5h
  - object: bone
    property: name
    reason: Bones are referenced by stable unique names.
    ownerBead: bony-c5h
  - object: slot
    property: name
    reason: Slots are referenced by stable unique names.
    ownerBead: bony-v1p
  - object: slot
    property: bone
    reason: Slots must attach draw state to a known bone.
    ownerBead: bony-v1p
  - object: region
    property: name
    reason: Region attachments are referenced by slot attachment names.
    ownerBead: bony-v1p
  - object: region
    property: width
    reason: Region attachments need dimensions for draw-batch quads.
    ownerBead: bony-v1p
  - object: region
    property: height
    reason: Region attachments need dimensions for draw-batch quads.
    ownerBead: bony-v1p
  - object: pointAttachment
    property: name
    reason: Point attachments are referenced by slot attachment names and helper queries.
    ownerBead: bony-wb1d
  - object: pointAttachment
    property: x
    reason: Point attachments need a local x coordinate for locator queries.
    ownerBead: bony-wb1d
  - object: pointAttachment
    property: y
    reason: Point attachments need a local y coordinate for locator queries.
    ownerBead: bony-wb1d
  - object: pointAttachment
    property: rotation
    reason: Point attachments need a local rotation in degrees for locator queries.
    ownerBead: bony-wb1d
  - object: boundingBoxAttachment
    property: name
    reason: Bounding-box attachments are referenced by slot attachment names and helper queries.
    ownerBead: bony-wb1d
  - object: boundingBoxAttachment
    property: vertices
    reason: A bounding-box attachment must carry a convex polygon for hit-test queries.
    ownerBead: bony-wb1d
  - object: clippingAttachment
    property: name
    reason: Clipping attachments are referenced by slot attachment names.
    ownerBead: bony-jkt
  - object: clippingAttachment
    property: vertices
    reason: A clipping attachment must carry a convex polygon to clip against.
    ownerBead: bony-jkt
  - object: meshAttachment
    property: name
    reason: Mesh attachments are referenced by slot attachment names.
    ownerBead: bony-lzj.1
  - object: meshAttachment
    property: meshVertices
    reason: A mesh attachment must carry its packed vertex geometry to draw or skin.
    ownerBead: bony-lzj.1
  - object: meshAttachment
    property: meshUvs
    reason: A mesh attachment must carry per-vertex texture coordinates to sample its page.
    ownerBead: bony-lzj.1
  - object: meshAttachment
    property: meshTriangles
    reason: A mesh attachment must carry its triangle index list to assemble geometry.
    ownerBead: bony-lzj.1
  - object: nestedRigAttachment
    property: name
    reason: Nested rig attachments are referenced by slot attachment names.
    ownerBead: bony-5b5w
  - object: nestedRigAttachment
    property: nestedSkeleton
    reason: A nested rig attachment must identify the nested skeleton asset or host-resolved skeleton id.
    ownerBead: bony-5b5w
  - object: path
    property: name
    reason: Path constraints are referenced by stable unique names.
    ownerBead: bony-8gs
  - object: path
    property: bone
    reason: A path constraint must identify the constrained bone.
    ownerBead: bony-8gs
  - object: path
    property: target
    reason: A path constraint must identify its target bone.
    ownerBead: bony-8gs
  - object: path
    property: path
    reason: A path constraint must identify the path attachment it samples.
    ownerBead: bony-8gs
  - object: ikConstraint
    property: name
    reason: IK constraints are referenced by stable unique names.
    ownerBead: bony-b5d.3
  - object: ikConstraint
    property: bones
    reason: An IK constraint must identify the bone chain it solves.
    ownerBead: bony-b5d.3
  - object: ikConstraint
    property: target
    reason: An IK constraint must identify its target bone.
    ownerBead: bony-b5d.3
  - object: transformConstraint
    property: name
    reason: Transform constraints are referenced by stable unique names.
    ownerBead: bony-8i1.2
  - object: transformConstraint
    property: bone
    reason: A transform constraint must identify the constrained bone.
    ownerBead: bony-8i1.2
  - object: transformConstraint
    property: target
    reason: A transform constraint must identify its target bone.
    ownerBead: bony-8i1.2
  - object: physicsConstraint
    property: name
    reason: Physics constraints are referenced by stable unique names.
    ownerBead: bony-1pp
  - object: physicsConstraint
    property: bone
    reason: A physics constraint must identify the constrained bone.
    ownerBead: bony-1pp
  - object: physicsConstraint
    property: channels
    reason: A physics constraint must enable at least one channel to have any effect.
    ownerBead: bony-1pp
  - object: pathAttachment
    property: name
    reason: Path attachments are referenced by path constraints.
    ownerBead: bony-8gs
  - object: pathAttachment
    property: p0x
    reason: Cubic path attachments need a first endpoint x coordinate.
    ownerBead: bony-8gs
  - object: pathAttachment
    property: p0y
    reason: Cubic path attachments need a first endpoint y coordinate.
    ownerBead: bony-8gs
  - object: pathAttachment
    property: p1x
    reason: Cubic path attachments need a first control x coordinate.
    ownerBead: bony-8gs
  - object: pathAttachment
    property: p1y
    reason: Cubic path attachments need a first control y coordinate.
    ownerBead: bony-8gs
  - object: pathAttachment
    property: p2x
    reason: Cubic path attachments need a second control x coordinate.
    ownerBead: bony-8gs
  - object: pathAttachment
    property: p2y
    reason: Cubic path attachments need a second control y coordinate.
    ownerBead: bony-8gs
  - object: pathAttachment
    property: p3x
    reason: Cubic path attachments need a second endpoint x coordinate.
    ownerBead: bony-8gs
  - object: pathAttachment
    property: p3y
    reason: Cubic path attachments need a second endpoint y coordinate.
    ownerBead: bony-8gs
  - object: parameter
    property: name
    reason: Parameters are looked up by stable name at runtime.
    ownerBead: bony-rmg
  - object: parameter
    property: parameterMin
    reason: Parameter axis needs a minimum bound for clamping and blending.
    ownerBead: bony-rmg
  - object: parameter
    property: parameterMax
    reason: Parameter axis needs a maximum bound for clamping and blending.
    ownerBead: bony-rmg
  - object: deformer
    property: deformerId
    reason: Deformers are referenced by stable unique id.
    ownerBead: bony-rmg
  - object: deformer
    property: deformerKind
    reason: Deformer kind discriminant is required to select the correct geometry record.
    ownerBead: bony-rmg
  - object: warpLattice
    property: warpMinX
    reason: Warp lattice needs bounding-box for UV coordinate computation.
