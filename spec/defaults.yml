# Canonical default-table source.
#
# Later feature beads append concrete object defaults here when they append the
# matching registry entries. Do not duplicate defaults in runtime code by hand;
# codegen consumes this file.

format: bony-default-table
defaultsVersion: 1

sourceOfTruth:
  defaultsOwn:
    - default values
    - default-omission decisions
    - default-apply behavior on load
  registryOwns:
    - object identity
    - property identity
    - property wire key
    - backing type
    - object property membership
  schemaOwns:
    - generated artifact only
    - no independent source-of-truth role

entrySchemas:
  objectDefaults:
    required:
      - object
      - properties
      - ownerBead
    fields:
      object: id of a declared registry object entry
      ownerBead: bead that introduced or last intentionally changed the defaults
      properties: mapping from property id to default entry
  propertyDefault:
    required:
      - value
      - omitWhenDefault
      - applyOnLoad
    fields:
      value: canonical YAML representation of the default value
      omitWhenDefault: whether JSON and binary canonical writers omit this value
      applyOnLoad: whether loaders synthesize this value when the field is absent
      equality: optional id from equalityModes; otherwise infer from backing type
      doc: human-readable explanation
  requiredProperty:
    required:
      - object
      - property
      - reason
      - ownerBead
    fields:
      object: id of a declared registry object entry
      property: id of a declared registry property valid for the owning object
      reason: why absence is invalid or owned outside default application
      ownerBead: bead that introduced the required/no-default rule
      doc: human-readable explanation

validationRules:
  - every objectDefaults.object must exist in registry/wire.yml objects
  - every property key in objectDefaults.properties must exist in registry/wire.yml propertyKeys
  - every defaulted property must be valid for the owning object
  - every default value must match the property's registry backing type and JSON schema type
  - omitWhenDefault true requires applyOnLoad true
  - every object property must appear exactly once in either objectDefaults.properties or requiredProperties
  - requiredProperties entries must reference properties valid for the owning object
  - changing an existing default requires the owner bead to update conformance expectations

equalityModes:
  - id: exactInteger
    appliesTo: [varuint, varint]
  - id: storedF32
    appliesTo: [f32]
  - id: exactFloat
    appliesTo: [f64]
  - id: exactBool
    appliesTo: [bool]
  - id: exactString
    appliesTo: [string]
  - id: exactColor
    appliesTo: [color]
  - id: exactBytes
    appliesTo: [bytes]
  - id: arrayElements
    appliesTo: [composite]
  - id: objectProperties
    appliesTo: [composite]

canonicalEquality:
  integers: exact numeric equality after range validation
  floats: compare stored f32 value for f32-backed fields, otherwise exact semantic value
  bools: exact boolean equality
  strings: exact Unicode scalar sequence equality with no normalization
  colors: exact channel equality in canonical RGBA order
  bytes: exact byte equality
  arrays: length and element equality in stored order
  objects: property-by-property equality using this table

objectDefaults:
  - object: skeleton
    ownerBead: bony-c5h
    properties:
      version:
        value: "0.1.0"
        omitWhenDefault: true
        applyOnLoad: true
        doc: Skeleton metadata version defaults to the package version.
  - object: bone
    ownerBead: bony-c5h
    properties:
      parent:
        value: ""
        omitWhenDefault: true
        applyOnLoad: true
        doc: Missing parent denotes a root bone.
      x:
        value: 0.0
        omitWhenDefault: true
        applyOnLoad: true
      y:
        value: 0.0
        omitWhenDefault: true
        applyOnLoad: true
      rotation:
        value: 0.0
        omitWhenDefault: true
        applyOnLoad: true
      scaleX:
        value: 1.0
        omitWhenDefault: true
        applyOnLoad: true
      scaleY:
        value: 1.0
        omitWhenDefault: true
        applyOnLoad: true
      shearX:
        value: 0.0
        omitWhenDefault: true
        applyOnLoad: true
      shearY:
        value: 0.0
        omitWhenDefault: true
        applyOnLoad: true
      inheritRotation:
        value: true
        omitWhenDefault: true
        applyOnLoad: true
      inheritScale:
        value: true
        omitWhenDefault: true
        applyOnLoad: true
      inheritReflection:
        value: true
        omitWhenDefault: true
        applyOnLoad: true
      transformMode:
        value: "normal"
        omitWhenDefault: true
        applyOnLoad: true
  - object: slot
    ownerBead: bony-v1p
    properties:
      attachment:
        value: ""
        omitWhenDefault: true
        applyOnLoad: true
  - object: region
    ownerBead: bony-v1p
    properties: {}
  - object: path
    ownerBead: bony-8gs
    properties:
      order:
        value: 0
        omitWhenDefault: true
        applyOnLoad: true
        doc: Constraint order defaults to the first world-transform slot.
  - object: pathAttachment
    ownerBead: bony-8gs
    properties: {}
  - object: parameter
    ownerBead: bony-rmg
    properties:
      parameterDefault:
        value: 0.0
        omitWhenDefault: true
        applyOnLoad: true
        doc: Parameter default value; 0.0 is omitted from the BNB stream.
  - object: deformer
    ownerBead: bony-rmg
    properties:
      parent:
        value: ""
        omitWhenDefault: true
        applyOnLoad: true
        doc: Empty string denotes a root deformer with no parent.
      deformerOrder:
        value: 0
        omitWhenDefault: true
        applyOnLoad: true
        doc: Global draw order defaults to 0.
  - object: warpLattice
    ownerBead: bony-rmg
    properties:
      warpRows:
        value: 2
        omitWhenDefault: true
        applyOnLoad: true
        doc: Warp lattice row count defaults to 2.
      warpCols:
        value: 2
        omitWhenDefault: true
        applyOnLoad: true
        doc: Warp lattice column count defaults to 2.
  - object: rotationDeformer
    ownerBead: bony-rmg
    properties:
      rotationScaleX:
        value: 1.0
        omitWhenDefault: true
        applyOnLoad: true
        doc: Rotation scale X defaults to 1.0.
      rotationScaleY:
        value: 1.0
        omitWhenDefault: true
        applyOnLoad: true
        doc: Rotation scale Y defaults to 1.0.
      rotationOpacity:
        value: 1.0
        omitWhenDefault: true
        applyOnLoad: true
        doc: Rotation opacity defaults to 1.0 (fully opaque).
  - object: keyformBlend
    ownerBead: bony-rmg
    properties: {}
  - object: keyform
    ownerBead: bony-rmg
    properties: {}

requiredProperties:
  - object: skeleton
    property: name
    reason: Skeleton metadata needs a stable name for diagnostics and tooling.
    ownerBead: bony-c5h
  - object: bone
    property: name
    reason: Bones are referenced by stable unique names.
    ownerBead: bony-c5h
  - object: slot
    property: name
    reason: Slots are referenced by stable unique names.
    ownerBead: bony-v1p
  - object: slot
    property: bone
    reason: Slots must attach draw state to a known bone.
    ownerBead: bony-v1p
  - object: region
    property: name
    reason: Region attachments are referenced by slot attachment names.
    ownerBead: bony-v1p
  - object: region
    property: width
    reason: Region attachments need dimensions for draw-batch quads.
    ownerBead: bony-v1p
  - object: region
    property: height
    reason: Region attachments need dimensions for draw-batch quads.
    ownerBead: bony-v1p
  - object: path
    property: name
    reason: Path constraints are referenced by stable unique names.
    ownerBead: bony-8gs
  - object: path
    property: bone
    reason: A path constraint must identify the constrained bone.
    ownerBead: bony-8gs
  - object: path
    property: target
    reason: A path constraint must identify its target bone.
    ownerBead: bony-8gs
  - object: path
    property: path
    reason: A path constraint must identify the path attachment it samples.
    ownerBead: bony-8gs
  - object: pathAttachment
    property: name
    reason: Path attachments are referenced by path constraints.
    ownerBead: bony-8gs
  - object: pathAttachment
    property: p0x
    reason: Cubic path attachments need a first endpoint x coordinate.
    ownerBead: bony-8gs
  - object: pathAttachment
    property: p0y
    reason: Cubic path attachments need a first endpoint y coordinate.
    ownerBead: bony-8gs
  - object: pathAttachment
    property: p1x
    reason: Cubic path attachments need a first control x coordinate.
    ownerBead: bony-8gs
  - object: pathAttachment
    property: p1y
    reason: Cubic path attachments need a first control y coordinate.
    ownerBead: bony-8gs
  - object: pathAttachment
    property: p2x
    reason: Cubic path attachments need a second control x coordinate.
    ownerBead: bony-8gs
  - object: pathAttachment
    property: p2y
    reason: Cubic path attachments need a second control y coordinate.
    ownerBead: bony-8gs
  - object: pathAttachment
    property: p3x
    reason: Cubic path attachments need a second endpoint x coordinate.
    ownerBead: bony-8gs
  - object: pathAttachment
    property: p3y
    reason: Cubic path attachments need a second endpoint y coordinate.
    ownerBead: bony-8gs
  - object: parameter
    property: name
    reason: Parameters are looked up by stable name at runtime.
    ownerBead: bony-rmg
  - object: parameter
    property: parameterMin
    reason: Parameter axis needs a minimum bound for clamping and blending.
    ownerBead: bony-rmg
  - object: parameter
    property: parameterMax
    reason: Parameter axis needs a maximum bound for clamping and blending.
    ownerBead: bony-rmg
  - object: deformer
    property: deformerId
    reason: Deformers are referenced by stable unique id.
    ownerBead: bony-rmg
  - object: deformer
    property: deformerKind
    reason: Deformer kind discriminant is required to select the correct geometry record.
    ownerBead: bony-rmg
  - object: warpLattice
    property: warpMinX
    reason: Warp lattice needs bounding-box for UV coordinate computation.
    ownerBead: bony-rmg
  - object: warpLattice
    property: warpMinY
    reason: Warp lattice needs bounding-box for UV coordinate computation.
    ownerBead: bony-rmg
  - object: warpLattice
    property: warpMaxX
    reason: Warp lattice needs bounding-box for UV coordinate computation.
    ownerBead: bony-rmg
  - object: warpLattice
    property: warpMaxY
    reason: Warp lattice needs bounding-box for UV coordinate computation.
    ownerBead: bony-rmg
  - object: warpLattice
    property: warpControlPoints
    reason: Warp lattice needs its control point array for deformation.
    ownerBead: bony-rmg
  - object: rotationDeformer
    property: rotationPivotX
    reason: Rotation deformer needs a pivot point for transform computation.
    ownerBead: bony-rmg
  - object: rotationDeformer
    property: rotationPivotY
    reason: Rotation deformer needs a pivot point for transform computation.
    ownerBead: bony-rmg
  - object: rotationDeformer
    property: rotationAngleDegrees
    reason: Rotation deformer needs an angle for transform computation.
    ownerBead: bony-rmg
  - object: keyformBlend
    property: blendValueCount
    reason: Keyform blend needs a value count to parse each keyform's packed values.
    ownerBead: bony-rmg
  - object: keyformBlend
    property: blendAxes
    reason: Keyform blend needs axis references to resolve parameter coordinates.
    ownerBead: bony-rmg
  - object: keyform
    property: blendCoordinates
    reason: Keyform needs packed coordinate values for multilinear interpolation.
    ownerBead: bony-rmg
  - object: keyform
    property: blendValues
    reason: Keyform needs packed deformed values for blending.
    ownerBead: bony-rmg
