        doc: Empty string means no default nested skin is requested.
      nestedAnimation:
        value: ""
        omitWhenDefault: true
        applyOnLoad: true
        doc: Empty string means no default nested animation is requested.
  - object: path
    ownerBead: bony-8gs
    properties:
      order:
        value: 0
        omitWhenDefault: true
        applyOnLoad: true
        doc: Constraint order defaults to the first world-transform slot.
      position:
        value: 0.0
        omitWhenDefault: true
        applyOnLoad: false
        doc: Runtime path solver opt-in normalized position along the path.
      translateMix:
        value: 1.0
        omitWhenDefault: true
        applyOnLoad: false
        doc: Runtime path solver opt-in translation blend.
      rotateMix:
        value: 0.0
        omitWhenDefault: true
        applyOnLoad: false
        doc: Runtime path solver opt-in tangent rotation blend.
      skinRequired:
        value: false
        omitWhenDefault: true
        applyOnLoad: true
        doc: Path constraints are always active unless explicitly gated by skin membership.
  - object: ikConstraint
    ownerBead: bony-b5d.3
    properties:
      order:
        value: 0
        omitWhenDefault: true
        applyOnLoad: true
        doc: Constraint order defaults to the first world-transform slot.
      mix:
        value: 1.0
        omitWhenDefault: true
        applyOnLoad: false
        doc: Runtime IK solver blend amount; full influence by default.
      bendPositive:
        value: true
        omitWhenDefault: true
        applyOnLoad: false
        doc: Runtime IK two-bone bend direction; positive bend by default.
      skinRequired:
        value: false
        omitWhenDefault: true
        applyOnLoad: true
        doc: IK constraints are always active unless explicitly gated by skin membership.
  - object: transformConstraint
    ownerBead: bony-8i1.2
    properties:
      order:
        value: 0
        omitWhenDefault: true
        applyOnLoad: true
        doc: Constraint order defaults to the first world-transform slot.
      translateMix:
        value: 1.0
        omitWhenDefault: true
        applyOnLoad: false
        doc: Transform constraint translation blend; full influence by default.
      rotateMix:
        value: 1.0
        omitWhenDefault: true
        applyOnLoad: false
        doc: Transform constraint rotation blend; full influence by default.
      scaleMix:
        value: 1.0
        omitWhenDefault: true
        applyOnLoad: false
        doc: Transform constraint scale blend; full influence by default.
      shearMix:
        value: 1.0
        omitWhenDefault: true
        applyOnLoad: false
        doc: Transform constraint shear blend; full influence by default.
      skinRequired:
        value: false
