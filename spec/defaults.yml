      parent:
        value: ""
        omitWhenDefault: true
        applyOnLoad: true
        doc: Missing parent denotes a root bone.
      x:
        value: 0.0
        omitWhenDefault: true
        applyOnLoad: true
      y:
        value: 0.0
        omitWhenDefault: true
        applyOnLoad: true
      rotation:
        value: 0.0
        omitWhenDefault: true
        applyOnLoad: true
      scaleX:
        value: 1.0
        omitWhenDefault: true
        applyOnLoad: true
      scaleY:
        value: 1.0
        omitWhenDefault: true
        applyOnLoad: true
      shearX:
        value: 0.0
        omitWhenDefault: true
        applyOnLoad: true
      shearY:
        value: 0.0
        omitWhenDefault: true
        applyOnLoad: true
      inheritRotation:
        value: true
        omitWhenDefault: true
        applyOnLoad: true
      inheritScale:
        value: true
        omitWhenDefault: true
        applyOnLoad: true
      inheritReflection:
        value: true
        omitWhenDefault: true
        applyOnLoad: true
      transformMode:
        value: "normal"
        omitWhenDefault: true
        applyOnLoad: true
      skinRequired:
        value: false
        omitWhenDefault: true
        applyOnLoad: true
        doc: Bones are always active unless explicitly gated by skin membership.
  - object: slot
    ownerBead: bony-v1p
