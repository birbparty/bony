  - object: warpLattice
    property: warpMinY
    reason: Warp lattice needs bounding-box for UV coordinate computation.
    ownerBead: bony-rmg
  - object: warpLattice
    property: warpMaxX
    reason: Warp lattice needs bounding-box for UV coordinate computation.
    ownerBead: bony-rmg
  - object: warpLattice
    property: warpMaxY
    reason: Warp lattice needs bounding-box for UV coordinate computation.
    ownerBead: bony-rmg
  - object: warpLattice
