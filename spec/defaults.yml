      rotationOpacity:
        value: 1.0
        omitWhenDefault: true
        applyOnLoad: true
        doc: Rotation opacity defaults to 1.0 (fully opaque).
  - object: keyformBlend
    ownerBead: bony-rmg
    properties: {}
  - object: keyform
    ownerBead: bony-rmg
    properties: {}
  - object: animationClip
    ownerBead: bony-cl8.9
    properties: {}
  - object: boneTimeline
    ownerBead: bony-cl8.9
    properties: {}
  - object: slotTimeline
    ownerBead: bony-cl8.9
    properties: {}
  - object: deformTimeline
    ownerBead: bony-68lj
    properties: {}
  - object: eventTimeline
    ownerBead: bony-0ofc
    properties: {}
  - object: stateMachine
    ownerBead: bony-cl8.9
    properties: {}
  - object: stateMachineInput
    ownerBead: bony-cl8.9
    properties:
      inputDefaultBool:
        value: false
        omitWhenDefault: true
        applyOnLoad: false
        doc: Bool input default is omitted when false; loaders validate input kind and raw presence before applying active-kind defaults.
      inputDefaultNumber:
        value: 0.0
        omitWhenDefault: true
        applyOnLoad: false
        doc: Number input default is omitted when zero; loaders validate input kind and raw presence before applying active-kind defaults.
  - object: stateMachineLayer
    ownerBead: bony-cl8.9
    properties:
      initialStateIndex:
        value: 0
        omitWhenDefault: true
        applyOnLoad: true
        doc: Omitted initial state resolves to the first loaded state in the layer.
  - object: stateMachineState
    ownerBead: bony-cl8.9
    properties:
      stateClipIndex:
        value: 0
        omitWhenDefault: true
        applyOnLoad: false
        doc: Clip state animation index can be omitted when zero, but loaders must validate state-kind-specific presence from the raw record.
      stateLoop:
        value: false
        omitWhenDefault: true
        applyOnLoad: false
        doc: Direct clip state loop can be omitted when false, but loaders must not synthesize it before state-kind validation.
      stateBlendInputIndex:
        value: 0
        omitWhenDefault: true
        applyOnLoad: false
        doc: Blend state input index can be omitted when zero, but loaders must validate state-kind-specific presence from the raw record.
  - object: stateMachineBlendClip
    ownerBead: bony-cl8.9
    properties:
      blendClipLoop:
        value: false
        omitWhenDefault: true
        applyOnLoad: true
        doc: Blend clip loop defaults to false.
  - object: stateMachineTransition
    ownerBead: bony-cl8.9
    properties: {}
  - object: stateMachineCondition
    ownerBead: bony-cl8.9
    properties:
      conditionBoolValue:
        value: true
        omitWhenDefault: true
        applyOnLoad: false
        doc: Bool-equals condition value can be omitted when true, but loaders must validate condition-kind-specific presence from the raw record.
      conditionNumberValue:
        value: 0.0
        omitWhenDefault: true
        applyOnLoad: false
        doc: Numeric condition value can be omitted when zero, but loaders must validate condition-kind-specific presence from the raw record.
  - object: stateMachineListener
    ownerBead: bony-g65e
    properties:
      listenerLayerIndex:
        value: 0
        omitWhenDefault: true
        applyOnLoad: false
        doc: Lifecycle listener layer index can be omitted when zero, but loaders must validate listener-kind-specific presence from the raw record.
      listenerFromStateIndex:
        value: 0
        omitWhenDefault: true
        applyOnLoad: false
        doc: Listener source state index can be omitted when zero, but loaders must validate listener-kind-specific presence from the raw record.
      listenerToStateIndex:
        value: 0
        omitWhenDefault: true
        applyOnLoad: false
        doc: Listener target state index can be omitted when zero, but loaders must validate listener-kind-specific presence from the raw record.
      listenerSlotIndex:
        value: 0
        omitWhenDefault: true
        applyOnLoad: false
        doc: Pointer listener slot index can be omitted when zero, but loaders must validate pointer-kind-specific presence from the raw record.
      listenerHelperKind:
        value: 0
        omitWhenDefault: true
        applyOnLoad: false
        doc: Pointer listener helper kind defaults to point only for canonical omission; loaders validate pointer-kind-specific presence from the raw record.
      listenerHelperTarget:
        value: ""
        omitWhenDefault: true
        applyOnLoad: false
        doc: Pointer listener helper target must be present for pointer listeners; lifecycle listeners reject it.
      listenerInputIndex:
        value: 0
        omitWhenDefault: true
        applyOnLoad: false
        doc: Pointer listener input index can be omitted when zero, but loaders must validate pointer-kind-specific presence from the raw record.
      listenerBoolValue:
        value: false
        omitWhenDefault: true
        applyOnLoad: false
        doc: Pointer listener bool value may be false but loaders must validate explicit presence for bool-input pointer listeners.
      listenerNumberValue:
        value: 0.0
        omitWhenDefault: true
        applyOnLoad: false
        doc: Pointer listener number value may be zero but loaders must validate explicit presence for number-input pointer listeners.
      listenerHitRadius:
        value: 0.0
        omitWhenDefault: true
        applyOnLoad: false
        doc: Point listener hit radius may be zero but loaders must validate explicit presence for point-target pointer listeners.
  - object: skin
