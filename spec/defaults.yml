      inertia:
        value: 0.0
        omitWhenDefault: true
        applyOnLoad: false
        doc: Physics inertia; no carried target motion by default.
      strength:
        value: 0.0
        omitWhenDefault: true
        applyOnLoad: false
        doc: Physics spring strength; no restoring force by default.
      damping:
        value: 0.0
        omitWhenDefault: true
        applyOnLoad: false
        doc: Physics velocity damping; undamped by default.
      mass:
        value: 1.0
        omitWhenDefault: true
        applyOnLoad: false
        doc: Physics mass; unit mass by default.
      gravity:
        value: 0.0
        omitWhenDefault: true
        applyOnLoad: false
        doc: Physics gravity force; none by default.
      wind:
        value: 0.0
        omitWhenDefault: true
        applyOnLoad: false
        doc: Physics wind force; none by default.
      physicsMix:
        value: 1.0
        omitWhenDefault: true
        applyOnLoad: false
        doc: Physics spring-offset blend; full influence by default.
      skinRequired:
        value: false
        omitWhenDefault: true
        applyOnLoad: true
        doc: Physics constraints are always active unless explicitly gated by skin membership.
  - object: pathAttachment
    ownerBead: bony-8gs
    properties: {}
  - object: parameter
    ownerBead: bony-rmg
    properties:
      parameterDefault:
        value: 0.0
        omitWhenDefault: true
        applyOnLoad: true
        doc: Parameter default value; 0.0 is omitted from the BNB stream.
  - object: deformer
    ownerBead: bony-rmg
