# Canonical append-only .bnb wire registry.
#
# This file defines the stable key spaces consumed by codegen and schema sync.
# Later feature beads append concrete object and property entries here. Do not
# renumber, delete, or repurpose existing keys.

format: bony-wire-registry
registryVersion: 1

reserved:
  typeKeyTerminator:
    key: 0
    meaning: object-stream-eof
  propertyKeyTerminator:
    key: 0
    meaning: object-property-list-terminator

keySpaces:
  typeKeys:
    encoding: varuint
    firstAssignable: 1
    appendOnly: true
    rangeSource: registry/key-ranges.md
  propertyKeys:
    encoding: varuint
    firstAssignable: 1
    appendOnly: true
    backingTypeScope: global
    rangeSource: registry/key-ranges.md

keyRanges:
  canonicalMilestoneTokens:
    - M1
    - M2
    - M3
    - M4
    - M5
    - M6
    - M7
    - M8
    - M9
    - M10
  appliesTo:
    - typeKeys
    - propertyKeys
  spacesAreIndependent: true
  bands:
    - milestone: M1
      first: 1
      last: 999
      scope: SkeletonData model, .bony JSON I/O, default tables
    - milestone: M2
      first: 1000
      last: 1999
      scope: World transforms, region attachments, draw order
    - milestone: M3
      first: 2000
      last: 2999
      scope: Animations, timelines, curves, mixing
    - milestone: M4
      first: 3000
      last: 3999
      scope: Meshes, weights, skins, deform timelines, clipping
    - milestone: M5
      first: 4000
      last: 4999
      scope: IK, transform, path, and physics constraints
    - milestone: M6
      first: 5000
      last: 5999
      scope: .bnb binary containers, ToC-backed objects, atlas embedding
    - milestone: M7
      first: 6000
      last: 6999
      scope: Warp and rotation deformers, keyforms, parameter blending
    - milestone: M8
      first: 7000
      last: 7999
      scope: State machines, layers, transitions, listeners
    - milestone: M9
      first: 8000
      last: 8999
      scope: Tooling/importer metadata that becomes first-class format data
    - milestone: M10
      first: 9000
      last: 9999
      scope: Consolidation, compatibility fixtures, reserved v1 completion hooks
  future:
    repositoryExtensions:
      first: 10000
      last: 19999
    unassigned:
      first: 20000

backingTypesStatus: skip-safe-via-property-byte-length
backingTypes:
  - id: varuint
    code: 1
    skipRule: read unsigned LEB128 value
  - id: varint
    code: 2
    skipRule: read zig-zag signed LEB128 value
  - id: f32
    code: 3
    skipRule: skip 4 little-endian bytes
  - id: bool
    code: 4
    skipRule: skip 1 byte
  - id: string
    code: 5
    skipRule: read varuint string-table index
  - id: color
    code: 6
    skipRule: skip 4 rgba8 bytes
  - id: bytes
    code: 7
    skipRule: skip exactly the surrounding property byteLength

tocSkipContract:
  status: resolved
  ownerBead: bony-uq1
  contract: docs/binary-toc-skip-semantics.md
  note: >
    Every non-terminator property record carries a varuint byteLength before
    its payload. Unknown-property skipping uses byteLength, so composite backing
    types can be added without requiring old readers to understand their
    internal layout.

entrySchemas:
  backingType:
    required:
      - id
      - code
      - skipRule
    fields:
      id: stable lowerCamelCase backing-type identifier used by codegen
      code: stable u8 backing type code used in the ToC
      skipRule: human-readable payload decoding or skip rule
  typeKey:
    required:
      - id
      - key
      - status
      - milestone
      - ownerBead
    fields:
      id: stable lowerCamelCase object-kind identifier used by codegen
      key: positive varuint unique within typeKeys
      status: active | deprecated | reserved
      milestone: owning milestone or reserved band label
      ownerBead: bead that introduced the key
      doc: human-readable description
  propertyKey:
    required:
      - id
      - key
      - backingType
      - status
      - milestone
      - ownerBead
    fields:
      id: stable lowerCamelCase property identifier used by codegen
      key: positive varuint unique within propertyKeys
      backingType: id from backingTypes
      status: active | deprecated | reserved
      milestone: owning milestone or reserved band label
      ownerBead: bead that introduced the key
      doc: human-readable description
  object:
    required:
      - type
      - properties
    fields:
      type: id of a declared typeKey
      properties: ordered list of declared propertyKey ids valid for this object
      doc: human-readable description

mutationRules:
  allowed:
    - append-type-key
    - append-property-key
    - add-compatible-object-property-use
    - add-documentation
    - mark-deprecated
  forbidden:
    - assign-key-zero
    - renumber-key
    - delete-shipped-key
    - reuse-deprecated-key
    - change-property-backing-type
    - change-backing-type-code
    - repurpose-identifier

schemaGeneration:
  jsonSchemaPath: spec/bony.schema.json
  generatedFrom:
    - registry/wire.yml
    - spec/defaults.yml
  schemaIsIndependentSource: false

typeKeys:
  - id: skeleton
    key: 1
    status: active
    milestone: M1
    ownerBead: bony-c5h
    doc: Skeleton-level metadata for a loaded SkeletonData asset.
  - id: bone
    key: 2
    status: active
    milestone: M1
    ownerBead: bony-c5h
    doc: Parent-first bone record used by M1 loaders and later transform passes.
  - id: slot
    key: 1000
    status: active
    milestone: M2
    ownerBead: bony-v1p
    doc: Slot record preserving draw order and attachment binding.
  - id: region
    key: 1001
    status: active
    milestone: M2
    ownerBead: bony-v1p
    doc: Rectangular region attachment record for backend-neutral drawing.
  - id: path
    key: 4000
    status: active
    milestone: M5
    ownerBead: bony-8gs
    doc: Path constraint record participating in the world-transform constraint pass.

propertyKeys:
  - id: name
    key: 1
    backingType: string
    status: active
    milestone: M1
    ownerBead: bony-c5h
    doc: Stable object name used for references.
  - id: version
    key: 2
    backingType: string
    status: active
    milestone: M1
    ownerBead: bony-c5h
    doc: Authoring/runtime package version string for skeleton metadata.
  - id: parent
    key: 3
    backingType: string
    status: active
    milestone: M1
    ownerBead: bony-c5h
    doc: Parent bone name; empty string denotes a root bone.
  - id: x
    key: 1000
    backingType: f32
    status: active
    milestone: M2
    ownerBead: bony-v1p
    doc: Local bone translation x in skeleton units.
  - id: y
    key: 1001
    backingType: f32
    status: active
    milestone: M2
    ownerBead: bony-v1p
    doc: Local bone translation y in skeleton units.
  - id: rotation
    key: 1002
    backingType: f32
    status: active
    milestone: M2
    ownerBead: bony-v1p
    doc: Local bone rotation in degrees at the JSON boundary.
  - id: scaleX
    key: 1003
    backingType: f32
    status: active
    milestone: M2
    ownerBead: bony-v1p
    doc: Local bone x-axis scale.
  - id: scaleY
    key: 1004
    backingType: f32
    status: active
    milestone: M2
    ownerBead: bony-v1p
    doc: Local bone y-axis scale.
  - id: shearX
    key: 1005
    backingType: f32
    status: active
    milestone: M2
    ownerBead: bony-v1p
    doc: Local bone x-axis shear in degrees at the JSON boundary.
  - id: shearY
    key: 1006
    backingType: f32
    status: active
    milestone: M2
    ownerBead: bony-v1p
    doc: Local bone y-axis shear in degrees at the JSON boundary.
  - id: inheritRotation
    key: 1007
    backingType: bool
    status: active
    milestone: M2
    ownerBead: bony-v1p
    doc: Whether a bone inherits parent rotation.
  - id: inheritScale
    key: 1008
    backingType: bool
    status: active
    milestone: M2
    ownerBead: bony-v1p
    doc: Whether a bone inherits parent scale/shear.
  - id: inheritReflection
    key: 1009
    backingType: bool
    status: active
    milestone: M2
    ownerBead: bony-v1p
    doc: Whether a bone inherits parent reflection sign.
  - id: transformMode
    key: 1010
    backingType: string
    status: active
    milestone: M2
    ownerBead: bony-v1p
    doc: Optional mode alias for the five valid transform flag triples.
  - id: slot
    key: 1011
    backingType: string
    status: active
    milestone: M2
    ownerBead: bony-v1p
    doc: Slot name used for draw-order records.
  - id: bone
    key: 1012
    backingType: string
    status: active
    milestone: M2
    ownerBead: bony-v1p
    doc: Bone name referenced by a slot.
  - id: attachment
    key: 1013
    backingType: string
    status: active
    milestone: M2
    ownerBead: bony-v1p
    doc: Region attachment name referenced by a slot.
  - id: width
    key: 1014
    backingType: f32
    status: active
    milestone: M2
    ownerBead: bony-v1p
    doc: Region attachment width in skeleton units.
  - id: height
    key: 1015
    backingType: f32
    status: active
    milestone: M2
    ownerBead: bony-v1p
    doc: Region attachment height in skeleton units.
  - id: target
    key: 4000
    backingType: string
    status: active
    milestone: M5
    ownerBead: bony-8gs
    doc: Target bone name used by a constraint.
  - id: path
    key: 4001
    backingType: string
    status: active
    milestone: M5
    ownerBead: bony-8gs
    doc: Path attachment name referenced by a path constraint.
  - id: order
    key: 4002
    backingType: varint
    status: active
    milestone: M5
    ownerBead: bony-8gs
    doc: Signed global constraint order value.

objects:
  - type: skeleton
    properties:
      - name
      - version
    doc: Skeleton-level metadata object.
  - type: bone
    properties:
      - name
      - parent
      - x
      - y
      - rotation
      - scaleX
      - scaleY
      - shearX
      - shearY
      - inheritRotation
      - inheritScale
      - inheritReflection
      - transformMode
    doc: Bone object loaded in parent-first order.
  - type: slot
    properties:
      - name
      - bone
      - attachment
    doc: Slot record preserving source draw order.
  - type: region
    properties:
      - name
      - width
      - height
    doc: Rectangular region attachment used by the M2 draw-batch surface.
  - type: path
    properties:
      - name
      - bone
      - target
      - path
      - order
    doc: Path constraint record loaded in source order.
