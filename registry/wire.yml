# Canonical append-only .bnb wire registry.
#
# This file defines the stable key spaces consumed by codegen and schema sync.
# Later feature beads append concrete object and property entries here. Do not
# renumber, delete, or repurpose existing keys.

format: bony-wire-registry
registryVersion: 1

reserved:
  typeKeyTerminator:
    key: 0
    meaning: object-stream-eof
  propertyKeyTerminator:
    key: 0
    meaning: object-property-list-terminator

keySpaces:
  typeKeys:
    encoding: varuint
    firstAssignable: 1
    appendOnly: true
    rangeSource: registry/key-ranges.md
  propertyKeys:
    encoding: varuint
    firstAssignable: 1
    appendOnly: true
    backingTypeScope: global
    rangeSource: registry/key-ranges.md

keyRanges:
  canonicalMilestoneTokens:
    - M1
    - M2
    - M3
    - M4
    - M5
    - M6
    - M7
    - M8
    - M9
    - M10
  appliesTo:
    - typeKeys
    - propertyKeys
  spacesAreIndependent: true
  bands:
    - milestone: M1
      first: 1
      last: 999
      scope: SkeletonData model, .bony JSON I/O, default tables
    - milestone: M2
      first: 1000
      last: 1999
      scope: World transforms, region attachments, draw order
    - milestone: M3
      first: 2000
      last: 2999
      scope: Animations, timelines, curves, mixing
    - milestone: M4
      first: 3000
      last: 3999
      scope: Meshes, weights, skins, deform timelines, clipping
    - milestone: M5
      first: 4000
      last: 4999
      scope: IK, transform, path, and physics constraints
    - milestone: M6
      first: 5000
      last: 5999
      scope: .bnb binary containers, ToC-backed objects, atlas embedding
    - milestone: M7
      first: 6000
      last: 6999
      scope: Warp and rotation deformers, keyforms, parameter blending
    - milestone: M8
      first: 7000
      last: 7999
      scope: State machines, layers, transitions, listeners
    - milestone: M9
      first: 8000
      last: 8999
      scope: Tooling/importer metadata that becomes first-class format data
    - milestone: M10
      first: 9000
      last: 9999
      scope: Consolidation, compatibility fixtures, reserved v1 completion hooks
  future:
    repositoryExtensions:
      first: 10000
      last: 19999
    unassigned:
      first: 20000

backingTypesStatus: skip-safe-via-property-byte-length
backingTypes:
  - id: varuint
    code: 1
    skipRule: read unsigned LEB128 value
  - id: varint
    code: 2
    skipRule: read zig-zag signed LEB128 value
  - id: f32
    code: 3
    skipRule: skip 4 little-endian bytes
  - id: bool
    code: 4
    skipRule: skip 1 byte
  - id: string
    code: 5
    skipRule: read varuint string-table index
  - id: color
    code: 6
    skipRule: skip 4 rgba8 bytes
  - id: bytes
    code: 7
    skipRule: skip exactly the surrounding property byteLength
  - id: f64
    code: 8
    skipRule: skip 8 little-endian bytes

tocSkipContract:
  status: resolved
  ownerBead: bony-uq1
  contract: docs/binary-toc-skip-semantics.md
  note: >
    Every non-terminator property record carries a varuint byteLength before
    its payload. Unknown-property skipping uses byteLength, so composite backing
    types can be added without requiring old readers to understand their
    internal layout.

entrySchemas:
  backingType:
    required:
      - id
      - code
      - skipRule
    fields:
      id: stable lowerCamelCase backing-type identifier used by codegen
      code: stable u8 backing type code used in the ToC
      skipRule: human-readable payload decoding or skip rule
  typeKey:
    required:
      - id
      - key
      - status
      - milestone
      - ownerBead
    fields:
      id: stable lowerCamelCase object-kind identifier used by codegen
      key: positive varuint unique within typeKeys
      status: active | deprecated | reserved
      milestone: owning milestone or reserved band label
      ownerBead: bead that introduced the key
      doc: human-readable description
  propertyKey:
    required:
      - id
      - key
      - backingType
      - status
      - milestone
      - ownerBead
    fields:
      id: stable lowerCamelCase property identifier used by codegen
      key: positive varuint unique within propertyKeys
      backingType: id from backingTypes
      status: active | deprecated | reserved
      milestone: owning milestone or reserved band label
      ownerBead: bead that introduced the key
      doc: human-readable description
  object:
    required:
      - type
      - properties
    fields:
      type: id of a declared typeKey
      properties: ordered list of declared propertyKey ids valid for this object
      doc: human-readable description

mutationRules:
  allowed:
    - append-type-key
    - append-property-key
    - add-compatible-object-property-use
    - add-documentation
    - mark-deprecated
  forbidden:
    - assign-key-zero
    - renumber-key
    - delete-shipped-key
    - reuse-deprecated-key
    - change-property-backing-type
    - change-backing-type-code
    - repurpose-identifier

schemaGeneration:
  jsonSchemaPath: spec/bony.schema.json
  generatedFrom:
    - registry/wire.yml
    - spec/defaults.yml
  schemaIsIndependentSource: false

typeKeys:
  - id: skeleton
    key: 1
    status: active
    milestone: M1
    ownerBead: bony-c5h
    doc: Skeleton-level metadata for a loaded SkeletonData asset.
  - id: bone
    key: 2
    status: active
    milestone: M1
    ownerBead: bony-c5h
    doc: Parent-first bone record used by M1 loaders and later transform passes.
  - id: slot
    key: 1000
    status: active
    milestone: M2
    ownerBead: bony-v1p
    doc: Slot record preserving draw order and attachment binding.
  - id: region
    key: 1001
    status: active
    milestone: M2
    ownerBead: bony-v1p
    doc: Rectangular region attachment record for backend-neutral drawing.
  - id: pointAttachment
    key: 1002
    status: active
    milestone: M2
    ownerBead: bony-wb1d
    doc: Non-rendered slot-local locator attachment; format/load only in this slice.
  - id: boundingBoxAttachment
    key: 1003
    status: active
    milestone: M2
    ownerBead: bony-wb1d
    doc: Non-rendered slot-local convex polygon helper attachment; format/load only in this slice.
  - id: clippingAttachment
    key: 3000
    status: active
    milestone: M4
    ownerBead: bony-jkt
    doc: Slot-bound convex clipping attachment; format/load only in this slice (no geometry clipping yet).
  - id: meshAttachment
    key: 3001
    status: active
    milestone: M4
    ownerBead: bony-lzj.1
    doc: Slot-bound deformable mesh attachment; format/load only in this slice (weighted skinning deferred to prompt 20).
  - id: deformTimeline
    key: 3002
    status: active
    milestone: M4
    ownerBead: bony-68lj
    doc: Clip-owned deform timeline animating a mesh attachment's per-vertex offsets over time; format/schema only in this slice (loader/mixer wiring deferred to prompt 24).
  - id: path
    key: 4000
    status: active
    milestone: M5
    ownerBead: bony-8gs
    doc: Path constraint record participating in the world-transform constraint pass.
  - id: pathAttachment
    key: 4001
    status: active
    milestone: M5
    ownerBead: bony-8gs
    doc: Cubic path attachment sampled by path constraints.
  - id: ikConstraint
    key: 4002
    status: active
    milestone: M5
    ownerBead: bony-b5d.3
    doc: Inverse-kinematics constraint record participating in the world-transform constraint pass.
  - id: transformConstraint
    key: 4003
    status: active
    milestone: M5
    ownerBead: bony-8i1.2
    doc: Transform constraint record participating in the world-transform constraint pass.
  - id: physicsConstraint
    key: 4004
    status: active
    milestone: M5
    ownerBead: bony-1pp
    doc: Physics constraint record evaluated in a later stateful pass than the world-transform constraints; format/load only in this slice.
  - id: parameter
    key: 6000
    status: active
    milestone: M7
    ownerBead: bony-rmg
    doc: Named scalar parameter axis with clamped min/max/default range.
  - id: deformer
    key: 6001
    status: active
    milestone: M7
    ownerBead: bony-rmg
    doc: Deformer header record; followed in stream by warpLattice or rotationDeformer, then optional keyformBlend.
  - id: warpLattice
    key: 6002
    status: active
    milestone: M7
    ownerBead: bony-rmg
    doc: Warp lattice geometry record immediately following its deformer header.
  - id: rotationDeformer
    key: 6003
    status: active
    milestone: M7
    ownerBead: bony-rmg
    doc: Rotation deformer record immediately following its deformer header.
  - id: keyformBlend
    key: 6004
    status: active
    milestone: M7
    ownerBead: bony-rmg
    doc: Keyform blend header record; followed by N keyform objects.
  - id: keyform
    key: 6005
    status: active
    milestone: M7
    ownerBead: bony-rmg
    doc: Single keyform record within a keyformBlend; coordinates and values packed as f32 bytes.
  - id: animationClip
    key: 2000
    status: active
    milestone: M3
    ownerBead: bony-cl8.9
    doc: Animation clip parent record; followed by owned boneTimeline, slotTimeline, deformTimeline, then eventTimeline records, in that emitted order.
  - id: boneTimeline
    key: 2001
    status: active
    milestone: M3
    ownerBead: bony-cl8.9
    doc: Bone animation timeline child record owned by the most recent animationClip.
  - id: slotTimeline
    key: 2002
    status: active
    milestone: M3
    ownerBead: bony-cl8.9
    doc: Slot animation timeline child record owned by the most recent animationClip.
  - id: eventTimeline
    key: 2003
    status: active
    milestone: M3
    ownerBead: bony-0ofc
    doc: Clip-owned (target-less) event timeline child record owned by the most recent animationClip; see docs/event-timeline-contract.md.
  - id: stateMachine
    key: 7000
    status: active
    milestone: M8
    ownerBead: bony-cl8.9
    doc: State-machine parent record; followed by owned inputs, layers, and listeners.
  - id: stateMachineInput
    key: 7001
    status: active
    milestone: M8
    ownerBead: bony-cl8.9
    doc: Typed state-machine input child record owned by the most recent stateMachine.
  - id: stateMachineLayer
    key: 7002
    status: active
    milestone: M8
    ownerBead: bony-cl8.9
    doc: State-machine layer child record owned by the most recent stateMachine.
  - id: stateMachineState
    key: 7003
    status: active
    milestone: M8
    ownerBead: bony-cl8.9
    doc: State-machine state child record owned by the most recent stateMachineLayer.
  - id: stateMachineBlendClip
    key: 7004
    status: active
    milestone: M8
    ownerBead: bony-cl8.9
    doc: Blend1d clip child record owned by the most recent blend1d stateMachineState.
  - id: stateMachineTransition
    key: 7005
    status: active
    milestone: M8
    ownerBead: bony-cl8.9
    doc: State-machine transition child record owned by the most recent stateMachineLayer.
  - id: stateMachineCondition
    key: 7006
    status: active
    milestone: M8
    ownerBead: bony-cl8.9
    doc: Transition condition child record owned by the most recent stateMachineTransition.
  - id: stateMachineListener
    key: 7007
    status: active
    milestone: M8
    ownerBead: bony-cl8.9
    doc: State-machine listener child record owned by the most recent stateMachine.
  - id: skin
    key: 3003
    status: active
    milestone: M4
    ownerBead: bony-4set
    doc: Named attachment-set parent record; followed immediately by owned skinEntry bindings.
  - id: skinEntry
    key: 3004
    status: active
    milestone: M4
    ownerBead: bony-4set
    doc: Skin-owned binding from a slot-visible attachment name to a concrete attachment definition.

