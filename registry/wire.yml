objects:
  - type: skeleton
    properties:
      - name
      - version
    doc: Skeleton-level metadata object.
  - type: bone
    properties:
      - name
      - parent
      - x
      - y
      - rotation
      - scaleX
      - scaleY
      - shearX
      - shearY
      - inheritRotation
      - inheritScale
      - inheritReflection
      - transformMode
    doc: Bone object loaded in parent-first order.
  - type: slot
    properties:
      - name
      - bone
      - attachment
    doc: Slot record preserving source draw order.
  - type: region
    properties:
      - name
      - width
      - height
    doc: Rectangular region attachment used by the M2 draw-batch surface.
  - type: pointAttachment
    properties:
      - name
      - x
      - y
      - rotation
    doc: Non-rendered point locator attachment loaded by name for host/runtime geometry queries.
  - type: boundingBoxAttachment
    properties:
      - name
      - vertices
    doc: Non-rendered convex polygon attachment loaded by name for host/runtime geometry queries.
  - type: clippingAttachment
    properties:
      - name
      - vertices
      - untilSlot
    doc: Slot-bound convex clipping attachment loaded by name; format/load only in this slice.
  - type: meshAttachment
    properties:
      - name
      - meshWeighted
      - meshVertices
      - meshUvs
      - meshTriangles
    doc: Slot-bound deformable mesh attachment loaded by name; format/load only in this slice (ownerBead bony-lzj.1).
  - type: path
    properties:
      - name
      - bone
      - target
      - path
      - order
      - position
      - translateMix
      - rotateMix
    doc: Path constraint record loaded in source order.
  - type: ikConstraint
    properties:
      - name
      - bones
      - target
      - order
      - mix
      - bendPositive
    doc: IK constraint record loaded in source order.
  - type: transformConstraint
    properties:
      - name
      - bone
      - target
      - order
      - translateMix
      - rotateMix
      - scaleMix
      - shearMix
    doc: Transform constraint record loaded in source order.
  - type: physicsConstraint
    properties:
      - name
      - bone
      - order
      - channels
      - inertia
      - strength
      - damping
      - mass
      - gravity
      - wind
      - physicsMix
    doc: Physics constraint record loaded in source order.
  - type: pathAttachment
    properties:
      - name
      - p0x
      - p0y
      - p1x
      - p1y
      - p2x
      - p2y
      - p3x
      - p3y
    doc: Cubic path attachment loaded by name for path constraints.
  - type: parameter
    properties:
      - name
      - parameterMin
      - parameterMax
      - parameterDefault
    doc: Parameter axis record loaded in global parameter order.
  - type: deformer
    properties:
      - deformerId
      - parent
      - deformerOrder
      - deformerKind
    doc: Deformer header; followed immediately by warpLattice or rotationDeformer, then optional keyformBlend.
  - type: warpLattice
    properties:
      - warpRows
      - warpCols
      - warpMinX
      - warpMinY
      - warpMaxX
      - warpMaxY
      - warpControlPoints
    doc: Warp lattice data immediately following its deformer header.
  - type: rotationDeformer
    properties:
      - rotationPivotX
      - rotationPivotY
      - rotationAngleDegrees
      - rotationScaleX
      - rotationScaleY
      - rotationOpacity
    doc: Rotation deformer data immediately following its deformer header.
  - type: keyformBlend
    properties:
      - blendValueCount
      - blendAxes
    doc: Keyform blend header immediately following its deformer geometry; followed by N keyform records.
  - type: keyform
    properties:
      - blendCoordinates
      - blendValues
    doc: Single keyform record within a keyformBlend; coordinates and values packed as f32 bytes.
  - type: animationClip
    properties:
      - name
    doc: Animation clip parent record; followed immediately by owned boneTimeline, slotTimeline, deformTimeline, then eventTimeline records, in that order.
  - type: boneTimeline
    properties:
      - boneIndex
      - boneTimelineKind
      - timelineKeys
    doc: Bone timeline child record owned by the most recent animationClip.
  - type: slotTimeline
    properties:
      - slotIndex
      - slotTimelineKind
      - timelineKeys
    doc: Slot timeline child record owned by the most recent animationClip.
  - type: deformTimeline
    properties:
      - deformSkin
      - slot
      - deformAttachment
      - deformVertexCount
      - deformKeys
    doc: Deform timeline child record owned by the most recent animationClip; animates a mesh attachment's per-vertex offsets.
  - type: eventTimeline
    properties:
      - eventKeys
    doc: Clip-owned (target-less) event timeline child record owned by the most recent animationClip; carries only the packed event keyframe payload.
  - type: stateMachine
    properties:
      - name
    doc: State-machine parent record; followed immediately by inputs, layers, and listeners.
  - type: stateMachineInput
    properties:
      - name
      - stateMachineInputKind
      - inputDefaultBool
      - inputDefaultNumber
    doc: State-machine input child record owned by the most recent stateMachine.
  - type: stateMachineLayer
    properties:
      - name
      - initialStateIndex
    doc: State-machine layer child record owned by the most recent stateMachine.
  - type: stateMachineState
    properties:
      - name
      - stateMachineStateKind
      - stateClipIndex
      - stateLoop
      - stateBlendInputIndex
    doc: State-machine state child record owned by the most recent stateMachineLayer.
  - type: stateMachineBlendClip
    properties:
      - blendClipAnimationIndex
      - blendClipValue
      - blendClipLoop
    doc: Blend clip child record owned by the most recent blend1d stateMachineState.
  - type: stateMachineTransition
    properties:
      - transitionFromStateIndex
      - transitionToStateIndex
    doc: State-machine transition child record owned by the most recent stateMachineLayer.
  - type: stateMachineCondition
    properties:
      - conditionInputIndex
      - stateMachineConditionKind
      - conditionBoolValue
      - conditionNumberValue
    doc: Transition condition child record owned by the most recent stateMachineTransition.
  - type: stateMachineListener
    properties:
      - name
      - stateMachineListenerKind
      - listenerLayerIndex
      - listenerFromStateIndex
      - listenerToStateIndex
      - listenerSlotIndex
      - listenerHelperKind
      - listenerHelperTarget
      - listenerInputIndex
      - listenerBoolValue
      - listenerNumberValue
      - listenerHitRadius
    doc: State-machine listener child record owned by the most recent stateMachine.
  - type: skin
    properties:
      - name
    doc: Named attachment-set parent record; followed immediately by owned skinEntry children.
  - type: skinEntry
    properties:
      - slot
      - skinAttachment
      - skinTarget
    doc: Skin-owned binding from a slot-visible attachment name to a concrete attachment definition.
